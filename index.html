<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Animated background particles */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveBackground 20s linear infinite;
            opacity: 0.5;
        }

        @keyframes moveBackground {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(50px, 50px);
            }
        }

        .calculator {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 40px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            width: 380px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        /* Hover effect at the boundary - outer glow */
        .calculator:hover {
            transform: translateY(-8px);
            box-shadow: 0 35px 55px rgba(0, 0, 0, 0.3), 0 0 0 3px rgba(102, 126, 234, 0.3), 0 0 0 6px rgba(118, 75, 162, 0.2);
        }

        /* Inner border glow effect */
        .calculator::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, #667eea, #764ba2, #667eea);
            border-radius: 42px;
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: -1;
        }

        .calculator:hover::before {
            opacity: 1;
        }

        .display {
            background: linear-gradient(135deg, #f8f9ff 0%, #e9ecef 100%);
            color: #2d2d44;
            padding: 40px 30px;
            text-align: right;
            word-wrap: break-word;
            word-break: break-all;
            position: relative;
            border-bottom: 1px solid rgba(102, 126, 234, 0.2);
        }

        /* Add subtle pattern to display */
        .display::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                45deg,
                rgba(102, 126, 234, 0.02) 0px,
                rgba(102, 126, 234, 0.02) 2px,
                transparent 2px,
                transparent 8px
            );
            pointer-events: none;
        }

        .previous-operand {
            font-size: 1.2rem;
            color: #6c757d;
            min-height: 32px;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .current-operand {
            font-size: 3rem;
            font-weight: 700;
            margin-top: 12px;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #2d2d44, #4a4a6a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 25px;
            background: #ffffff;
        }

        button {
            border: none;
            outline: none;
            background: white;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 20px;
            font-family: 'Poppins', sans-serif;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        /* Ripple effect */
        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.8);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:active::before {
            width: 300px;
            height: 300px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        button:active {
            transform: translateY(0px);
        }

        .span-two {
            grid-column: span 2;
        }

        /* Number buttons */
        button:not(.operator):not(.equals):not(.clear) {
            background: linear-gradient(135deg, #ffffff, #fafbff);
            color: #2d2d44;
            font-weight: 600;
            border: 1px solid rgba(102, 126, 234, 0.1);
        }

        button:not(.operator):not(.equals):not(.clear):hover {
            background: linear-gradient(135deg, #ffffff, #f0f2ff);
            border-color: rgba(102, 126, 234, 0.3);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.15);
        }

        /* Operator buttons */
        .operator {
            background: linear-gradient(135deg, #ff6b6b, #ff8787);
            color: white;
            font-size: 1.4rem;
            border: none;
            position: relative;
        }

        .operator:hover {
            background: linear-gradient(135deg, #ff5252, #ff6b6b);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
        }

        /* Equals button */
        .equals {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 1.4rem;
            font-weight: 700;
            border: none;
            position: relative;
        }

        .equals:hover {
            background: linear-gradient(135deg, #5a6fd8, #6842a0);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        /* Clear button */
        .clear {
            background: linear-gradient(135deg, #ffd89b, #ffb347);
            color: #2d2d44;
            font-weight: 700;
            border: none;
        }

        .clear:hover {
            background: linear-gradient(135deg, #ffce8b, #ffa834);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 179, 71, 0.4);
        }

        /* Delete button */
        button:nth-child(2) {
            background: linear-gradient(135deg, #a8edea, #fed6e3);
            color: #2d2d44;
            border: none;
        }

        button:nth-child(2):hover {
            background: linear-gradient(135deg, #98e6e3, #fec6d3);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(168, 237, 234, 0.4);
        }

        /* Zero button special styling */
        button[onclick="appendNumber('0')"] {
            background: linear-gradient(135deg, #ffffff, #fafbff);
        }

        /* Add animation for button press */
        @keyframes buttonPress {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(0.95);
            }
            100% {
                transform: scale(1);
            }
        }

        button:active {
            animation: buttonPress 0.2s ease;
        }

        /* Boundary hover effect - pulse animation */
        @keyframes pulseGlow {
            0% {
                box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.4);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(102, 126, 234, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(102, 126, 234, 0);
            }
        }

        .calculator:hover {
            animation: pulseGlow 1.5s ease-out;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="previous-operand" id="previousOperand"></div>
            <div class="current-operand" id="currentOperand">0</div>
        </div>
        <div class="buttons">
            <button class="clear span-two" onclick="clearDisplay()">AC</button>
            <button onclick="deleteLast()">⌫</button>
            <button class="operator" onclick="appendOperator('/')">÷</button>
            
            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="appendOperator('*')">×</button>
            
            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button class="operator" onclick="appendOperator('-')">−</button>
            
            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button class="operator" onclick="appendOperator('+')">+</button>
            
            <button onclick="appendNumber('0')">0</button>
            <button onclick="appendDecimal()">.</button>
            <button class="equals span-two" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let currentOperand = '';
        let previousOperand = '';
        let operation = null;

        const currentOperandElement = document.getElementById('currentOperand');
        const previousOperandElement = document.getElementById('previousOperand');

        function updateDisplay() {
            currentOperandElement.textContent = currentOperand || '0';
            if (operation && previousOperand) {
                previousOperandElement.textContent = `${previousOperand} ${getOperationSymbol(operation)}`;
            } else {
                previousOperandElement.textContent = previousOperand;
            }
        }

        function getOperationSymbol(op) {
            switch(op) {
                case '+': return '+';
                case '-': return '−';
                case '*': return '×';
                case '/': return '÷';
                default: return '';
            }
        }

        function appendNumber(number) {
            if (number === '0' && currentOperand === '0') return;
            if (currentOperand.length >= 15) return;
            currentOperand += number;
            updateDisplay();
        }

        function appendDecimal() {
            if (currentOperand.includes('.')) return;
            if (currentOperand === '') {
                currentOperand = '0.';
            } else {
                currentOperand += '.';
            }
            updateDisplay();
        }

        function appendOperator(op) {
            if (currentOperand === '') return;
            if (previousOperand !== '' && operation && currentOperand !== '') {
                calculate();
            }
            previousOperand = currentOperand;
            operation = op;
            currentOperand = '';
            updateDisplay();
        }

        function calculate() {
            if (previousOperand === '' || currentOperand === '' || !operation) return;
            
            let result;
            const prev = parseFloat(previousOperand);
            const current = parseFloat(currentOperand);
            
            if (isNaN(prev) || isNaN(current)) return;
            
            switch(operation) {
                case '+':
                    result = prev + current;
                    break;
                case '-':
                    result = prev - current;
                    break;
                case '*':
                    result = prev * current;
                    break;
                case '/':
                    if (current === 0) {
                        alert('Cannot divide by zero!');
                        clearDisplay();
                        return;
                    }
                    result = prev / current;
                    break;
                default:
                    return;
            }
            
            result = Math.round(result * 1000000) / 1000000;
            currentOperand = result.toString();
            previousOperand = '';
            operation = null;
            updateDisplay();
        }

        function clearDisplay() {
            currentOperand = '';
            previousOperand = '';
            operation = null;
            updateDisplay();
        }

        function deleteLast() {
            if (currentOperand === '') return;
            currentOperand = currentOperand.slice(0, -1);
            updateDisplay();
        }

        document.addEventListener('keydown', (event) => {
            const key = event.key;
            
            if (key >= '0' && key <= '9') {
                appendNumber(key);
            } else if (key === '.') {
                appendDecimal();
            } else if (key === '+' || key === '-' || key === '*' || key === '/') {
                appendOperator(key);
            } else if (key === 'Enter' || key === '=') {
                calculate();
            } else if (key === 'Escape') {
                clearDisplay();
            } else if (key === 'Backspace') {
                deleteLast();
            }
        });
    </script>
</body>
</html>
